name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [18.x, 20.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      env:
        # Authenticate the @vscode/ripgrep prebuilt download to avoid GitHub API
        # rate-limit 403s during postinstall on CI runners.
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm ci

    - name: Rebuild native modules (better-sqlite3) for the CI Node ABI
      # Without this the better-sqlite3 .node binary often mismatches the runner's
      # Node version and the entire database test suite (~200 tests) is skipped.
      run: npm rebuild better-sqlite3

    - name: Run type check
      run: npm run typecheck

    - name: Run linter
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      env:
        # Authenticate the @vscode/ripgrep prebuilt download to avoid GitHub API
        # rate-limit 403s during postinstall on CI runners.
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm ci

    - name: Run security audit (documented gate)
      # Blocks on any critical and on any undocumented high; documented highs live
      # in audit-allowlist.json with a rationale + expiry. Moderates/lows are tracked,
      # non-blocking. See scripts/ci-audit-gate.mjs.
      run: node scripts/ci-audit-gate.mjs

    - name: Run dependency check
      run: npx depcheck

  build-matrix:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      env:
        # Authenticate the @vscode/ripgrep prebuilt download to avoid GitHub API
        # rate-limit 403s during postinstall on CI runners.
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm ci

    - name: Build
      run: npm run build

    - name: Package
      run: npm pack

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: '*.tgz'
