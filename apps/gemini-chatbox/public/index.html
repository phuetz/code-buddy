<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Chatbox</title>
    <style>
      :root {
        --bg: linear-gradient(135deg, #f7fafc 0%, #e6f2ff 100%);
        --card: #ffffff;
        --text: #1a202c;
        --muted: #4a5568;
        --accent: #0b7285;
        --accent-2: #1098ad;
        --border: #dbe4ea;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }
      .chat {
        width: 100%;
        max-width: 820px;
        height: min(85vh, 900px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
      }
      .header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }
      .header h1 {
        margin: 0;
        font-size: 1.1rem;
      }
      .header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .messages {
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 85%;
        padding: 10px 12px;
        border-radius: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }
      .msg.user {
        align-self: flex-end;
        background: #d3f9d8;
      }
      .msg.assistant {
        align-self: flex-start;
        background: #f1f3f5;
      }
      .composer {
        border-top: 1px solid var(--border);
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      textarea {
        width: 100%;
        resize: none;
        min-height: 52px;
        max-height: 140px;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 10px 12px;
        font: inherit;
      }
      button {
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        padding: 0 18px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status {
        color: var(--muted);
        font-size: 0.82rem;
        padding: 0 14px 10px;
      }
    </style>
  </head>
  <body>
    <main class="chat">
      <header class="header">
        <h1>Gemini Chatbox</h1>
        <p>Application de test en conditions réelles avec l’API Gemini.</p>
      </header>
      <section id="messages" class="messages"></section>
      <form id="chat-form" class="composer">
        <textarea
          id="message-input"
          name="message"
          placeholder="Écris ton message..."
          required
        ></textarea>
        <button id="send-btn" type="submit">Envoyer</button>
      </form>
      <div id="status" class="status">Prêt.</div>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
